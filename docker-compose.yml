# =========================================================
# Services ================================================
# =========================================================
services:
# #########################################################
# WEB #####################################################
# #########################################################
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: digitec_web
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://digitec:changeme@db:5432/digitec?schema=public
      NODE_ENV: production
      PORT: 3002
    ports:
      - 3002:3002
    restart: unless-stopped
# #########################################################
# DB ######################################################
# #########################################################
  db:
    image: postgres:15
    container_name: digitec_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: digitec
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: digitec
    volumes:
      - db-data:/var/lib/postgresql/data
    # ports:
    #   - 5432:5432

# =========================================================
# Networks ================================================
# =========================================================


# =========================================================
# Volumes =================================================
# =========================================================
volumes:
  db-data:

